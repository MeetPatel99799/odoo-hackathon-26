services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env        # DB_HOST/PORT/NAME/USER/PASSWORD/SSL, PORT, JWT_*

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env       # VITE_* build-time vars (baked in at docker build)

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
